name: Build and Push Photo AI Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  IMAGE_NAME: photo-ai-worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            dsfsdfnikhith/photo-ai-worker:v3
            dsfsdfnikhith/photo-ai-worker:latest
